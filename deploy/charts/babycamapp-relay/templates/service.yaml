apiVersion: v1
kind: Service
metadata:
  name: {{ include "babycamapp-relay.fullname" . }}
  labels:
    {{- include "babycamapp-relay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- if .Values.tlsSidecar.enabled }}
    - port: {{ .Values.tlsSidecar.port }}
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "babycamapp-relay.selectorLabels" . | nindent 4 }}
