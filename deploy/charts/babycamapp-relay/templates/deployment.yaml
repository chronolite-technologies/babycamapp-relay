apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "babycamapp-relay.fullname" . }}
  labels:
    {{- include "babycamapp-relay.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "babycamapp-relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "babycamapp-relay.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "babycamapp-relay.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.env.RELAY_PORT | default "8080" }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "babycamapp-relay.fullname" . }}-env
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.tlsSidecar.enabled }}
        - name: tls-proxy
          image: "{{ .Values.tlsSidecar.image }}"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL
          ports:
            - name: https
              containerPort: {{ .Values.tlsSidecar.port }}
              protocol: TCP
          volumeMounts:
            - name: tls-proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls-certs
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            {{- toYaml .Values.tlsSidecar.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.tlsSidecar.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.tlsSidecar.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
        {{- end }}
      {{- if .Values.tlsSidecar.enabled }}
      volumes:
        - name: tls-proxy-config
          configMap:
            name: {{ include "babycamapp-relay.fullname" . }}-tls-proxy
        - name: tls-certs
          secret:
            secretName: {{ .Values.tlsSidecar.tlsSecretName }}
            optional: true
        - name: nginx-tmp
          emptyDir:
            sizeLimit: 8Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 8Mi
        - name: nginx-run
          emptyDir:
            sizeLimit: 1Mi
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
