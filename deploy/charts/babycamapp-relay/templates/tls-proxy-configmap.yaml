{{- if .Values.tlsSidecar.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "babycamapp-relay.fullname" . }}-tls-proxy
  labels:
    {{- include "babycamapp-relay.labels" . | nindent 4 }}
data:
  nginx.conf: |
    pid /var/run/nginx.pid;
    events { worker_connections 64; }
    http {
      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;
      fastcgi_temp_path /tmp/fastcgi;
      uwsgi_temp_path /tmp/uwsgi;
      scgi_temp_path /tmp/scgi;
      server {
        listen {{ .Values.tlsSidecar.port }} ssl;
        server_name {{ .Values.tlsSidecar.serverName }};
        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
          proxy_pass http://127.0.0.1:{{ .Values.env.RELAY_PORT | default "8080" }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }
      }
    }
{{- end }}
