---
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    uses: chronolite-technologies/helm-workflows/.github/workflows/release-please.yml@main
    with:
      chart-path: deploy/charts/babycamapp-relay
      chart-name: babycamapp-relay
      config-file: .github/release-please-config.json
      manifest-file: .github/.release-please-manifest.json
    secrets: inherit
